    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: #0a1120; }

      /* Leaflet map dark filter */
      .leaflet-tile { filter: brightness(0.85) saturate(0.9) hue-rotate(5deg); }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0d1424; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

      /* Wipe slider thumb */
      input[type=range].wipe-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px; height: 18px;
        background: #f59e0b;
        border-radius: 50%;
        cursor: ew-resize;
        box-shadow: 0 0 12px rgba(245,158,11,0.7);
      }
      input[type=range].wipe-slider::-moz-range-thumb {
        width: 18px; height: 18px;
        background: #f59e0b;
        border-radius: 50%;
        cursor: ew-resize;
        border: none;
        box-shadow: 0 0 12px rgba(245,158,11,0.7);
      }
      input[type=range].wipe-slider {
        -webkit-appearance: none;
        background: transparent;
        outline: none;
        width: 100%;
        cursor: ew-resize;
      }
      input[type=range].wipe-slider::-webkit-slider-runnable-track {
        background: rgba(245,158,11,0.3);
        border-radius: 4px; height: 4px;
      }

      /* Pulse animation for severity dot */
      @keyframes pulse-ring {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(2.2); opacity: 0; }
      }
      .severity-pulse::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: inherit;
        animation: pulse-ring 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
      }

      /* Shimmer loading skeleton */
      @keyframes shimmer {
        0% { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }
      .skeleton {
        background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
        background-size: 800px 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 6px;
      }

      /* Fade-in transition */
      .fade-in { animation: fadeIn 0.4s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

      /* Leaflet overrides for dark theme */
      .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #1e293b; color: #cbd5e1; }
      .leaflet-bar a { background: #1e293b; color: #f59e0b; border-color: #334155; }
      .leaflet-bar a:hover { background: #334155; }
    </style>
